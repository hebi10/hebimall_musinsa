<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hebimall Events Visual Comparison</title>
    <style>
      :root {
        --bg: #f6f5f2;
        --surface: #fff;
        --text: #111;
        --muted: #687082;
        --line: #ddd8cf;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      header {
        padding: 32px clamp(16px, 4vw, 48px) 20px;
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        letter-spacing: 0;
      }

      .summary {
        max-width: 860px;
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      main {
        display: grid;
        gap: 28px;
        padding: 28px clamp(16px, 4vw, 48px) 48px;
      }

      section {
        display: grid;
        gap: 14px;
      }

      h2 {
        margin: 0;
        font-size: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        align-items: start;
      }

      .single {
        grid-template-columns: minmax(0, 520px);
      }

      figure {
        margin: 0;
        overflow: hidden;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }

      .note {
        color: var(--muted);
        font-size: 13px;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>이벤트 페이지 Before / After</h1>
      <p class="summary">
        A안(에디토리얼 기획전형) 기준으로 준비중 이미지와 큰 placeholder 영역을 제거하고,
        목록/상세에서 기존 메인 editorial 자산을 사용하도록 정리했습니다.
      </p>
    </header>

    <main>
      <section>
        <h2>/events 목록</h2>
        <div class="grid">
          <figure>
            <figcaption><span>Before</span><span>준비중 이미지 중심</span></figcaption>
            <img src="current-events-desktop.png" alt="이벤트 목록 수정 전" />
          </figure>
          <figure>
            <figcaption><span>After</span><span>editorial hero + 카드 이미지</span></figcaption>
            <img src="after-events-list-desktop.png" alt="이벤트 목록 수정 후" />
          </figure>
        </div>
      </section>

      <section>
        <h2>/events/[eventId] 상세</h2>
        <div class="grid">
          <figure>
            <figcaption><span>Before</span><span>대형 준비중 배너</span></figcaption>
            <img src="current-event-detail-desktop.png" alt="이벤트 상세 수정 전" />
          </figure>
          <figure>
            <figcaption><span>After</span><span>이미지 + 혜택 요약 패널</span></figcaption>
            <img src="after-event-detail-desktop.png" alt="이벤트 상세 수정 후" />
          </figure>
        </div>
      </section>

      <section>
        <h2>모바일 상세 확인</h2>
        <div class="grid single">
          <figure>
            <figcaption><span>After</span><span>390px viewport</span></figcaption>
            <img src="after-event-detail-mobile.png" alt="이벤트 상세 모바일 수정 후" />
          </figure>
        </div>
        <p class="note">
          개발 서버: http://localhost:3000. Chrome 탭에서도 /events/와 상세 페이지를 열어 확인했습니다.
        </p>
      </section>
    </main>
  </body>
</html>
